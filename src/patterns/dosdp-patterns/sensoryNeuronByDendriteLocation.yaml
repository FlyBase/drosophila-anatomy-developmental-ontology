pattern_name: sensoryNeuronByDendriteLocation
pattern_iri: http://purl.obolibrary.org/obo/fbbt/src/patterns/dosdp-patterns/sensoryNeuronByDendriteLocation.yaml
description: "Pattern for sensory neurons that can be uniquely defined by their sensory dendrite location (optionally in combination with modality). Modality is expressed as a compound: 'capable_of some (detection_type and part_of some perception_type)'. Use multiple rows per defined_class for additional modalities rather than pipe-separated values. Can optionally add soma location(s) and nerve(s) - separated by '|'. Not for segment-specific subclasses of larval neurons (see larvalSensoryNeuronBySegment)."

contributors:
  - https://orcid.org/0000-0002-1373-1705

classes:
  anatomical_entity: FBbt:10000000
  detection_of_stimulus: GO:0051606
  biological_process: GO:0008150
  nerve: FBbt:00005105
  neuron: FBbt:00005106

relations:
  has_sensory_dendrite_in: RO:0013007
  capable_of: RO:0002215
  has_soma_location: RO:0002100
  fasciculates_with: RO:0002101
  part_of: BFO:0000050

vars:
  defining_detection: detection_of_stimulus
  defining_perception: biological_process
  dendrite_location: anatomical_entity
  other_detection: detection_of_stimulus
  other_perception: biological_process

list_vars:
  nerve: nerve
  soma_location: anatomical_entity

logical_axioms:
   - axiom_type: equivalentTo
     multi_clause:
      sep: " and "
      clauses:
        - text: "neuron that has_sensory_dendrite_in some %s"
          vars:
            - dendrite_location
        - text: "'capable_of' some (%s and 'part_of' some %s)"
          vars:
            - defining_detection
            - defining_perception
   - axiom_type: subClassOf
     multi_clause:
      sep: " and "
      clauses:
        - text: "'capable_of' some (%s and 'part_of' some %s)"
          vars:
            - other_detection
            - other_perception
   - axiom_type: subClassOf
     multi_clause:
      sep: " and "
      clauses:
        - text: "'fasciculates_with'some %s"
          vars:
            - nerve
   - axiom_type: subClassOf
     multi_clause:
      sep: " and "
      clauses:
        - text: "'has_soma_location'some %s"
          vars:
            - soma_location

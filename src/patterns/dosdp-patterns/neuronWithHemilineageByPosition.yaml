pattern_name: neuronWithHemilineageByPosition
pattern_iri: http://purl.obolibrary.org/obo/fbbt/src/patterns/dosdp-patterns/neuronWithHemilineageByPosition.yaml
description: "Pattern for adding terms for neurons of a hemilineage defined by its position (with unknown Notch status). For known N status, use neuronByBirthStageAndNotchStatusFromNeuroblastAtDevStage."

contributors:
  - https://orcid.org/0000-0002-1373-1705

classes:
  neuron: FBbt:00005106
  neuroblast: FBbt:00005146
  anatomical_entity: FBbt:10000000

relations: 
  develops_from: RO:0002202
  has_soma_location: RO:0002100

annotationProperties:
  synonym_type: oboInOwl:hasSynonymType
  database_cross_reference: oboInOwl:hasDbXref
  exact_synonym: oboInOwl:hasExactSynonym

vars:
  neuroblast: neuroblast
  ito_lee: thing
  hartenstein: thing
  nb_label: thing
  ito_lee_synonym_type: thing
  hartenstein_synonym_type: thing
  H_position: thing

list_vars:
  soma: anatomical_entity

data_list_vars:
  reference: thing

logical_axioms:
   - axiom_type: subClassOf
     text: "neuron"
   - axiom_type: subClassOf
     text: "'develops_from' some %s"
     vars:
       - neuroblast
   - axiom_type: subClassOf
     multi_clause:
      sep: " and "
      clauses:
        - text: "'has_soma_location' some %s"
          vars:
            - soma

name:
  text: "%s"
  vars:
    - nb_label

def:
  text: "Neuron that develops from %s and belongs to the hemilineage with somas in a relatively %s cluster in the adult."
  vars:
    - neuroblast
    - IL_position
  xrefs: reference

generated_synonyms:
  - text: "%s"
    vars:
      - ito_lee
    xrefs: reference
    annotations:
      - annotationProperty: synonym_type
        var: ito_lee_synonym_type
  - text: "%s"
    vars:
      - hartenstein
    xrefs: reference
    annotations:
      - annotationProperty: synonym_type
        var: hartenstein_synonym_type


